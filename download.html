<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="download.css">
    <title>Download</title>
</head>

<body>

    <div class="card">

        <!-- 🔥 IMAGE DYNAMIQUE -->
        <img id="newsImage" src="" alt="Card Image">

        <!-- 🔥 CONTENU DYNAMIQUE -->
        <div class="card-content">
            <h3 id="INDEXID1"></h3>
            <p id="INDEXID2"></p>
        </div>

        <!-- FOOTER -->
        <div class="card-footer">

            <span class="downloads" style="display:flex;">
                <p id="downloadsCount"></p>&nbsp;
                <p id="INDEXID6"></p>
            </span>

            <button class="btn-download" id="downloadBtn"></button>

        </div>
    </div>

    <!-- LIBS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/i18next@23.4.6/dist/umd/i18next.min.js"></script>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCaZ2ayLosWDbF3-iu0CTr2EbvtWdGCKCk",
            authDomain: "comming-grafcfta2100.firebaseapp.com",
            databaseURL: "https://comming-grafcfta2100-default-rtdb.firebaseio.com",
            projectId: "comming-grafcfta2100",
            storageBucket: "comming-grafcfta2100.firebasestorage.app",
            messagingSenderId: "417932287789",
            appId: "1:417932287789:web:1385328615c9b4ca327da4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 🔥 PARAMS
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        const savedLangpdf = params.get("lang") || "fr";

        // ----------------------------
        // I18N
        // ----------------------------
        i18next.init({
            lng: savedLangpdf,
            resources: {
                en: {
                    translation: {
                        INDEXID6: "Downloads",
                        downloadBtn: "Download"
                    }
                },
                fr: {
                    translation: {
                        INDEXID6: "Téléchargements",
                        downloadBtn: "Télécharger"
                    }
                }
            }
        }).then(() => {
            document.getElementById("INDEXID6").innerHTML = i18next.t("INDEXID6");
            document.getElementById("downloadBtn").innerHTML = i18next.t("downloadBtn");
        });

        // ----------------------------
        // 🔥 LOAD NEWS DATA
        // ----------------------------
        async function loadNews() {

            if (!id) {
                Swal.fire("Erreur", "ID manquant", "error");
                return;
            }

            const snap = await get(child(ref(db), "news/" + id));

            if (!snap.exists()) {
                Swal.fire("Erreur", "News introuvable", "error");
                return;
            }

            const data = snap.val();

            // 🔥 IMAGE DYNAMIQUE
            if (data.image) {
                document.getElementById("newsImage").src = data.image;
            }

            // 🔥 TITRE
            document.getElementById("INDEXID1").innerHTML = data.title || "";

            // 🔥 CONTENU
            document.getElementById("INDEXID2").innerHTML = data.content || "";

            // 🔥 STOCKER PDF
            window.currentPDF = data.pdf;
            window.currentPDFName = data.pdfName || "document.pdf";
        }

        // ----------------------------
        // 🔥 DOWNLOAD SYSTEM
        // ----------------------------
        async function runDownload() {

            const { value: formValues } = await Swal.fire({
                title: "Télécharger le document",
                html: `
                    <input id="name" class="swal2-input" placeholder="Nom">
                    <input id="email" class="swal2-input" placeholder="Email">
                `,
                preConfirm: () => {
                    const name = document.getElementById("name").value;
                    const email = document.getElementById("email").value;

                    if (!name || !email) {
                        Swal.showValidationMessage("Champs requis");
                        return false;
                    }
                    return { name, email };
                }
            });

            if (!formValues) return;

            const { name, email } = formValues;

            // check email
            const check = await get(child(ref(db), "isdownloads/" + btoa(email)));
            if (check.exists()) {
                Swal.fire("Refusé", "Déjà téléchargé", "error");
                return;
            }

            Swal.fire({
                title: "Téléchargement...",
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            await set(ref(db, "isdownloads/" + btoa(email)), {
                name,
                email,
                newsId: id,
                date: new Date().toISOString()
            });

            // 🔥 DOWNLOAD DYNAMIQUE
            const link = document.createElement("a");
            link.href = window.currentPDF;
            link.download = window.currentPDFName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            Swal.fire("Succès", "Téléchargement lancé", "success");
        }

        // ----------------------------
        // COUNT DOWNLOADS
        // ----------------------------
        async function showCount() {
            const snap = await get(ref(db, "isdownloads"));
            document.getElementById("downloadsCount").textContent =
                snap.exists() ? Object.keys(snap.val()).length : 0;
        }

        // ----------------------------
        // INIT
        // ----------------------------
        document.addEventListener("DOMContentLoaded", () => {
            loadNews();
            showCount();

            document.getElementById("downloadBtn").addEventListener("click", runDownload);
        });

    </script>
</body>

</html>
